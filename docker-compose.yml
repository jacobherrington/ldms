services:
  ldms-mcp:
    build:
      context: .
    working_dir: /app
    stdin_open: true
    tty: false
    command: ["bundle", "exec", "ruby", "app/mcp/server.rb"]
    environment:
      LDMS_PROJECT_ID: dev-memory
      LDMS_OLLAMA_URL: http://host.docker.internal:11434/api/embeddings
      LDMS_MONITOR_TELEMETRY: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - ldms_data:/app/data

  ldms-ui:
    build:
      context: .
    working_dir: /app
    command: ["bundle", "exec", "ruby", "app/ui/server.rb"]
    environment:
      LDMS_PROJECT_ID: dev-memory
      LDMS_UI_BIND: 0.0.0.0
      LDMS_UI_PORT: 4567
      LDMS_OLLAMA_URL: http://host.docker.internal:11434/api/embeddings
      LDMS_MONITOR_TELEMETRY: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - ldms_data:/app/data
    ports:
      - "4567:4567"

  ldms-smoke:
    build:
      context: .
    working_dir: /app
    command: ["bash", "scripts/run.sh", "--smoke"]
    environment:
      LDMS_PROJECT_ID: dev-memory
      LDMS_OLLAMA_URL: http://host.docker.internal:11434/api/embeddings
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - ldms_data:/app/data

volumes:
  ldms_data:
